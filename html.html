<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Buddy - Productivity Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }

        body.light-mode {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: white;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background-color: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-secondary {
            background-color: #f093fb;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #dd82f0;
        }

        .btn-danger {
            background-color: #ff6b6b;
            color: white;
            padding: 5px 10px;
            font-size: 0.9rem;
        }

        .btn-danger:hover {
            background-color: #ff5252;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .task-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        input[type="text"],
        select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .task-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .task-item {
            background: #f5f5f5;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .task-item.completed {
            opacity: 0.6;
            text-decoration: line-through;
        }

        .task-item:hover {
            background: #efefef;
        }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-weight: 600;
            color: #333;
        }

        .task-category {
            font-size: 0.85rem;
            color: #999;
            margin-top: 3px;
        }

        .task-actions {
            display: flex;
            gap: 5px;
        }

        .pomodoro {
            text-align: center;
        }

        .timer-display {
            font-size: 3rem;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .timer-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .timer-buttons button {
            flex: 1;
        }

        .session-info {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .resources-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .resource-item {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .resource-content {
            flex: 1;
        }

        .resource-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .resource-link {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
            word-break: break-all;
        }

        .resource-link:hover {
            text-decoration: underline;
        }

        .resource-notes {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            font-style: italic;
        }

        .quote-container {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-style: italic;
            margin-bottom: 20px;
        }

        .quote-text {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .quote-author {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .progress-container {
            margin-top: 15px;
        }

        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 20px;
            overflow: hidden;
            margin: 10px 0;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
            transition: width 0.3s ease;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-buttons button {
            flex: 1;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            color: #667eea;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .controls {
                width: 100%;
                justify-content: center;
            }

            .timer-display {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Study Buddy</h1>
            <div class="controls">
                <button class="btn-secondary" onclick="toggleTheme()">🌙 Theme</button>
            </div>
        </header>

        <div class="quote-container" id="quoteContainer">
            <div class="quote-text" id="quoteText">Loading motivation...</div>
            <div class="quote-author" id="quoteAuthor"></div>
        </div>

        <div class="dashboard">
            <!-- Task Management Card -->
            <div class="card">
                <h2>✓ Tasks</h2>
                <div class="task-form">
                    <input type="text" id="taskInput" placeholder="Enter a task..." />
                    <select id="categorySelect">
                        <option value="General">General</option>
                        <option value="Math">Math</option>
                        <option value="Science">Science</option>
                        <option value="Coding">Coding</option>
                        <option value="Literature">Literature</option>
                        <option value="History">History</option>
                    </select>
                    <button class="btn-primary" onclick="addTask()">Add Task</button>
                </div>
                <div class="task-list" id="taskList"></div>
                <div class="progress-container">
                    <div class="stats">
                        <div class="stat-item">
                            <div class="stat-value" id="totalTasks">0</div>
                            <div class="stat-label">Total</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-value" id="completedTasks">0</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pomodoro Timer Card -->
            <div class="card pomodoro">
                <h2>⏱️ Pomodoro Timer</h2>
                <div class="session-info" id="sessionInfo">
                    Focus Session (25 min)
                </div>
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-buttons">
                    <button class="btn-primary" onclick="startTimer()">Start</button>
                    <button class="btn-primary" onclick="pauseTimer()">Pause</button>
                    <button class="btn-primary" onclick="resetTimer()">Reset</button>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="sessionsCompleted">0</div>
                        <div class="stat-label">Sessions</div>
                    </div>
                </div>
            </div>

            <!-- Resource Hub Card -->
            <div class="card">
                <h2>🔗 Resources</h2>
                <div class="resources-form">
                    <input type="text" id="resourceTitle" placeholder="Resource title..." />
                    <input type="text" id="resourceLink" placeholder="https://example.com" />
                    <input type="text" id="resourceNotes" placeholder="Add notes..." />
                    <button class="btn-primary" onclick="addResource()">Add Resource</button>
                </div>
                <div id="resourceList"></div>
            </div>
        </div>
    </div>

    <script>
        // Initialize app
        let timerInterval = null;
        let timeLeft = 1500; // 25 minutes in seconds
        let isRunning = false;
        let isBreak = false;

        // Load data from localStorage on startup
        document.addEventListener('DOMContentLoaded', () => {
            loadTasks();
            loadResources();
            loadStats();
            fetchQuote();
            updateTaskDisplay();
        });

        // Task Management Functions
        function addTask() {
            const taskInput = document.getElementById('taskInput');
            const categorySelect = document.getElementById('categorySelect');
            const taskText = taskInput.value.trim();

            if (!taskText) {
                alert('Please enter a task!');
                return;
            }

            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const task = {
                id: Date.now(),
                text: taskText,
                category: categorySelect.value,
                completed: false
            };

            tasks.push(task);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            taskInput.value = '';
            categorySelect.value = 'General';
            updateTaskDisplay();
        }

        function deleteTask(id) {
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            updateTaskDisplay();
        }

        function toggleTask(id) {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                localStorage.setItem('tasks', JSON.stringify(tasks));
                updateTaskDisplay();
            }
        }

        function loadTasks() {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            if (tasks.length === 0) {
                localStorage.setItem('tasks', JSON.stringify([]));
            }
        }

        function updateTaskDisplay() {
            const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            if (tasks.length === 0) {
                taskList.innerHTML = '<p style="text-align: center; color: #999;">No tasks yet. Add one to get started!</p>';
            } else {
                tasks.forEach(task => {
                    const taskEl = document.createElement('div');
                    taskEl.className = `task-item ${task.completed ? 'completed' : ''}`;
                    taskEl.innerHTML = `
                        <div class="task-info">
                            <div class="task-name">${escapeHtml(task.text)}</div>
                            <div class="task-category">${task.category}</div>
                        </div>
                        <div class="task-actions">
                            <button class="btn-primary" style="padding: 5px 10px; font-size: 0.85rem;" onclick="toggleTask(${task.id})">
                                ${task.completed ? '↩️' : '✓'}
                            </button>
                            <button class="btn-danger" onclick="deleteTask(${task.id})">🗑️</button>
                        </div>
                    `;
                    taskList.appendChild(taskEl);
                });
            }

            // Update statistics
            const completed = tasks.filter(t => t.completed).length;
            document.getElementById('totalTasks').textContent = tasks.length;
            document.getElementById('completedTasks').textContent = completed;
        }

        // Pomodoro Timer Functions
        function startTimer() {
            if (isRunning) return;
            isRunning = true;

            timerInterval = setInterval(() => {
                timeLeft--;

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    switchSession();
                }

                updateTimerDisplay();
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
        }

        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            isBreak = false;
            timeLeft = 1500;
            updateTimerDisplay();
            document.getElementById('sessionInfo').textContent = 'Focus Session (25 min)';
        }

        function switchSession() {
            if (!isBreak) {
                // Switching to break
                isBreak = true;
                timeLeft = 300; // 5 minutes
                document.getElementById('sessionInfo').textContent = 'Break Time (5 min)';
                incrementSessions();
            } else {
                // Switching to focus session
                isBreak = false;
                timeLeft = 1500; // 25 minutes
                document.getElementById('sessionInfo').textContent = 'Focus Session (25 min)';
            }
            updateTimerDisplay();
            alert(isBreak ? '🎉 Break time! Stretch and relax.' : '📚 Back to focus!');
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function incrementSessions() {
            let sessions = parseInt(localStorage.getItem('sessions')) || 0;
            sessions++;
            localStorage.setItem('sessions', sessions);
            document.getElementById('sessionsCompleted').textContent = sessions;
        }

        // Resource Hub Functions
        function addResource() {
            const titleInput = document.getElementById('resourceTitle');
            const linkInput = document.getElementById('resourceLink');
            const notesInput = document.getElementById('resourceNotes');

            const title = titleInput.value.trim();
            const link = linkInput.value.trim();

            if (!title || !link) {
                alert('Please enter both title and link!');
                return;
            }

            const resources = JSON.parse(localStorage.getItem('resources')) || [];
            const resource = {
                id: Date.now(),
                title: title,
                link: link,
                notes: notesInput.value.trim()
            };

            resources.push(resource);
            localStorage.setItem('resources', JSON.stringify(resources));
            
            titleInput.value = '';
            linkInput.value = '';
            notesInput.value = '';
            loadResources();
        }

        function deleteResource(id) {
            let resources = JSON.parse(localStorage.getItem('resources')) || [];
            resources = resources.filter(r => r.id !== id);
            localStorage.setItem('resources', JSON.stringify(resources));
            loadResources();
        }

        function loadResources() {
            const resources = JSON.parse(localStorage.getItem('resources')) || [];
            const resourceList = document.getElementById('resourceList');
            resourceList.innerHTML = '';

            if (resources.length === 0) {
                resourceList.innerHTML = '<p style="text-align: center; color: #999;">No resources yet. Add one!</p>';
            } else {
                resources.forEach(resource => {
                    const resourceEl = document.createElement('div');
                    resourceEl.className = 'resource-item';
                    resourceEl.innerHTML = `
                        <div class="resource-content">
                            <div class="resource-title">${escapeHtml(resource.title)}</div>
                            <a href="${escapeHtml(resource.link)}" target="_blank" class="resource-link">${escapeHtml(resource.link)}</a>
                            ${resource.notes ? `<div class="resource-notes">${escapeHtml(resource.notes)}</div>` : ''}
                        </div>
                        <button class="btn-danger" onclick="deleteResource(${resource.id})">🗑️</button>
                    `;
                    resourceList.appendChild(resourceEl);
                });
            }
        }

        // Utility Functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function loadStats() {
            const sessions = localStorage.getItem('sessions') || '0';
            document.getElementById('sessionsCompleted').textContent = sessions;
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
        }

        function fetchQuote() {
            // Array of inspirational quotes
            const quotes = [
                { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
                { text: "Success is not final, failure is not fatal.", author: "Winston Churchill" },
                { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
                { text: "It always seems impossible until it's done.", author: "Nelson Mandela" },
                { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
                { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
                { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
                { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" }
            ];

            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('quoteText').textContent = `"${randomQuote.text}"`;
            document.getElementById('quoteAuthor').textContent = `— ${randomQuote.author}`;
        }

        // Load theme preference
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
